services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: runner
    env_file:
      - apps/server/.env
    environment:
      - PORT=4000
    ports:
      - '4000:4000'
    restart: unless-stopped
  media-processor:
    build:
      context: ./apps/media-processor
      dockerfile: Dockerfile
    env_file:
      - apps/media-processor/.env
    environment:
      - PORT=4005
    ports:
      - '4005:4005'
    restart: unless-stopped
